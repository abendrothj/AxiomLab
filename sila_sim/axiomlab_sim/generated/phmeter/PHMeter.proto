syntax = "proto3";

import "SiLAFramework.proto";

package sila2.org.axiomlab.measurement.phmeter.v1;

/* Potentiometric pH measurement device. */
service PHMeter {
  /* Measure pH of a sample. */
  rpc ReadPH (sila2.org.axiomlab.measurement.phmeter.v1.ReadPH_Parameters) returns (sila2.org.axiomlab.measurement.phmeter.v1.ReadPH_Responses) {}
  /* Two-point calibration with standard buffer solutions. */
  rpc Calibrate (sila2.org.axiomlab.measurement.phmeter.v1.Calibrate_Parameters) returns (sila2.org.axiomlab.measurement.phmeter.v1.Calibrate_Responses) {}
}

/* Parameters for ReadPH */
message ReadPH_Parameters {
  sila2.org.silastandard.String SampleId = 1;  /* Identifier of the sample to measure. */
}

/* Responses of ReadPH */
message ReadPH_Responses {
  sila2.org.silastandard.Real PHValue = 1;  /* Measured pH (0–14). */
  sila2.org.silastandard.Real Temperature = 2;  /* Sample temperature during measurement in Celsius. */
}

/* Parameters for Calibrate */
message Calibrate_Parameters {
  sila2.org.silastandard.Real BufferPH1 = 1;  /* pH value of first calibration buffer. */
  sila2.org.silastandard.Real BufferPH2 = 2;  /* pH value of second calibration buffer. */
}

/* Responses of Calibrate */
message Calibrate_Responses {
  sila2.org.silastandard.String CalibrationStatus = 1;  /* Calibration result: 'Success' or 'Failed'. */
}
