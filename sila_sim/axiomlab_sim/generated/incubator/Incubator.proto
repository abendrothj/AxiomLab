syntax = "proto3";

import "SiLAFramework.proto";

package sila2.org.axiomlab.environment.incubator.v1;

/* Temperature-controlled incubation chamber for biological samples. */
service Incubator {
  /* Set the incubator target temperature. */
  rpc SetTemperature (sila2.org.axiomlab.environment.incubator.v1.SetTemperature_Parameters) returns (sila2.org.axiomlab.environment.incubator.v1.SetTemperature_Responses) {}
  /* Get the current incubator temperature. */
  rpc ReadTemperature (sila2.org.axiomlab.environment.incubator.v1.ReadTemperature_Parameters) returns (sila2.org.axiomlab.environment.incubator.v1.ReadTemperature_Responses) {}
  /* Run incubation for a specified duration. */
  rpc Incubate (sila2.org.axiomlab.environment.incubator.v1.Incubate_Parameters) returns (sila2.org.axiomlab.environment.incubator.v1.Incubate_Responses) {}
}

/* Parameters for SetTemperature */
message SetTemperature_Parameters {
  sila2.org.silastandard.Real TemperatureCelsius = 1;  /* Target temperature in Celsius (4–95°C). */
}

/* Responses of SetTemperature */
message SetTemperature_Responses {
  sila2.org.silastandard.Real ConfirmedTemperature = 1;  /* Confirmed target temperature. */
}

/* Parameters for ReadTemperature */
message ReadTemperature_Parameters {
}

/* Responses of ReadTemperature */
message ReadTemperature_Responses {
  sila2.org.silastandard.Real CurrentTemperature = 1;  /* Current chamber temperature in Celsius. */
  sila2.org.silastandard.Real TargetTemperature = 2;  /* Current setpoint in Celsius. */
}

/* Parameters for Incubate */
message Incubate_Parameters {
  sila2.org.silastandard.Real DurationMinutes = 1;  /* Incubation time in minutes. */
}

/* Responses of Incubate */
message Incubate_Responses {
  sila2.org.silastandard.Real ElapsedTime = 1;  /* Actual elapsed incubation time in minutes. */
}
