name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc for gRPC build)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run server integration tests
        run: cargo test -p axiomlab-server

      - name: Run pipeline rejection integration tests
        run: cargo test -p agent_runtime --test pipeline_rejection

      - name: Run agent_runtime doc tests
        run: cargo test -p agent_runtime --doc
