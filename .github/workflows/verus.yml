name: Verus Proof Verification

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Verus
        uses: actions/cache@v4
        with:
          path: ~/verus
          key: verus-0.2025.1.1

      - name: Download Verus
        run: |
          if [ ! -f ~/verus/verus ]; then
            wget -q https://github.com/verus-lang/verus/releases/download/v0.2025.1.1/verus-x86_64-unknown-linux-gnu.tar.gz
            mkdir -p ~/verus
            tar -xzf verus-*.tar.gz -C ~/verus
            chmod +x ~/verus/verus
          fi

      - name: Verify the binding safety spec
        run: ~/verus/verus verus_verified/lab_safety.rs

      - name: Check runtime uses the verified constants
        run: cargo test -p verus_proofs --test verify_consistency
