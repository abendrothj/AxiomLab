syntax = "proto3";

import "SiLAFramework.proto";

package sila2.org.axiomlab.motion.roboticarm.v1;

/* 3-axis robotic arm for lab automation. */
service RoboticArm {
  /* Move the arm to an absolute XYZ position in mm. */
  rpc MoveArm (sila2.org.axiomlab.motion.roboticarm.v1.MoveArm_Parameters) returns (sila2.org.axiomlab.motion.roboticarm.v1.MoveArm_Responses) {}
}

/* Parameters for MoveArm */
message MoveArm_Parameters {
  sila2.org.silastandard.Real X = 1;  /* Target X coordinate in millimetres (0–300). */
  sila2.org.silastandard.Real Y = 2;  /* Target Y coordinate in millimetres (0–300). */
  sila2.org.silastandard.Real Z = 3;  /* Target Z coordinate in millimetres (0–250). */
}

/* Responses of MoveArm */
message MoveArm_Responses {
  sila2.org.silastandard.Real ReachedX = 1;  /* Confirmed X position after move. */
  sila2.org.silastandard.Real ReachedY = 2;  /* Confirmed Y position after move. */
  sila2.org.silastandard.Real ReachedZ = 3;  /* Confirmed Z position after move. */
}
