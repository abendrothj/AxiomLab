services:
  axiomlab:
    build:
      context: .
      dockerfile: Dockerfile
      # No explicit platform \u2014 Docker BuildKit will build for the host architecture.
      # Verus is x86-linux only; on arm64 the Dockerfile installs a graceful stub.
    # No platform pin \u2014 the container runs natively on the host (amd64 or arm64).
    container_name: axiomlab
    volumes:
      # Mount source for live editing (overrides COPY in Dockerfile)
      - .:/axiomlab
      # Persist cargo registry + build cache across runs
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - axiomlab-target:/axiomlab/target
    environment:
      - VERUS_PATH=/usr/local/bin/verus
      - AENEAS_PATH=/usr/local/bin/aeneas
      - RUST_LOG=info
      # Signal to tests that we're running inside Docker (enables full verification)
      - AXIOMLAB_DOCKER=1
      # Pass through optional LLM config
      - AXIOMLAB_LLM_ENDPOINT=${AXIOMLAB_LLM_ENDPOINT:-}
      - AXIOMLAB_LLM_API_KEY=${AXIOMLAB_LLM_API_KEY:-}
      - AXIOMLAB_LLM_MODEL=${AXIOMLAB_LLM_MODEL:-}
    working_dir: /axiomlab
    # Default command: run all tests
    command: cargo test
    # Keep stdin open for interactive use with `docker compose run`
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  axiomlab-target:
